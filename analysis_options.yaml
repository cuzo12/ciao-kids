# Static analysis configuration for Ciao Kids.
#
# Builds on the official Flutter lint set and tightens a few rules that keep the
# codebase consistent as it scales across many feature modules.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat missing documentation on public APIs as a warning to honor the
    # project rule: "Document every class."
    public_member_api_docs: ignore # raised to `warning` once art/assets settle
    todo: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_single_quotes
    - sort_child_properties_last
    - use_key_in_widget_constructors
